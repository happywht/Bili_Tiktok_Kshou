[pytest]
# pytest配置文件

# 测试目录
testpaths = tests

# 默认命令行选项
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# 标记定义
markers =
    bilibili: B站相关测试
    douyin: 抖音相关测试
    xiaohongshu: 小红书相关测试
    slow: 慢速测试（需要网络请求或浏览器）
    interactive: 需要用户交互的测试
    integration: 集成测试

# 最小Python版本
minversion = 7.0

# 忽略的目录
norecursedirs = .git __pycache__ node_modules venv .venv

# 日志配置
log_cli = false
log_cli_level = INFO

# Python文件和类命名模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*
